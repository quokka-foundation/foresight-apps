<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <rect width="120" height="120" fill="#0A0B0D"/>
  <!-- Star/spotlight shape via dot-matrix -->
  <g fill="#EC4899">
    <!-- Central star burst -->
    <circle cx="60" cy="55" r="4" opacity="1.0"/>
    <circle cx="60" cy="45" r="3" opacity="0.9"/><circle cx="60" cy="65" r="3" opacity="0.9"/>
    <circle cx="50" cy="55" r="3" opacity="0.9"/><circle cx="70" cy="55" r="3" opacity="0.9"/>
    <circle cx="52" cy="47" r="3" opacity="0.7"/><circle cx="68" cy="47" r="3" opacity="0.7"/>
    <circle cx="52" cy="63" r="3" opacity="0.7"/><circle cx="68" cy="63" r="3" opacity="0.7"/>
    <!-- Rays -->
    <circle cx="60" cy="35" r="2.5" opacity="0.6"/><circle cx="60" cy="25" r="2" opacity="0.4"/>
    <circle cx="60" cy="15" r="1.5" opacity="0.2"/>
    <circle cx="60" cy="75" r="2.5" opacity="0.6"/><circle cx="60" cy="85" r="2" opacity="0.4"/>
    <circle cx="60" cy="95" r="1.5" opacity="0.2"/>
    <circle cx="40" cy="55" r="2.5" opacity="0.6"/><circle cx="30" cy="55" r="2" opacity="0.4"/>
    <circle cx="20" cy="55" r="1.5" opacity="0.2"/>
    <circle cx="80" cy="55" r="2.5" opacity="0.6"/><circle cx="90" cy="55" r="2" opacity="0.4"/>
    <circle cx="100" cy="55" r="1.5" opacity="0.2"/>
    <!-- Diagonal rays -->
    <circle cx="45" cy="40" r="2" opacity="0.4"/><circle cx="35" cy="30" r="1.5" opacity="0.2"/>
    <circle cx="75" cy="40" r="2" opacity="0.4"/><circle cx="85" cy="30" r="1.5" opacity="0.2"/>
    <circle cx="45" cy="70" r="2" opacity="0.4"/><circle cx="35" cy="80" r="1.5" opacity="0.2"/>
    <circle cx="75" cy="70" r="2" opacity="0.4"/><circle cx="85" cy="80" r="1.5" opacity="0.2"/>
    <!-- Stage floor -->
    <circle cx="30" cy="100" r="2" opacity="0.15"/><circle cx="40" cy="100" r="2" opacity="0.15"/>
    <circle cx="50" cy="100" r="2" opacity="0.2"/><circle cx="60" cy="100" r="2" opacity="0.25"/>
    <circle cx="70" cy="100" r="2" opacity="0.2"/><circle cx="80" cy="100" r="2" opacity="0.15"/>
    <circle cx="90" cy="100" r="2" opacity="0.15"/>
  </g>
</svg>