<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <rect width="120" height="120" fill="#0A0B0D"/>
  <!-- Bitcoin/chain-link shape via dot-matrix -->
  <g fill="#3B82F6">
    <!-- Outer ring -->
    <circle cx="60" cy="20" r="3" opacity="0.6"/>
    <circle cx="45" cy="25" r="3" opacity="0.5"/><circle cx="75" cy="25" r="3" opacity="0.5"/>
    <circle cx="35" cy="35" r="3" opacity="0.5"/><circle cx="85" cy="35" r="3" opacity="0.5"/>
    <circle cx="30" cy="48" r="3" opacity="0.6"/><circle cx="90" cy="48" r="3" opacity="0.6"/>
    <circle cx="28" cy="60" r="3" opacity="0.7"/><circle cx="92" cy="60" r="3" opacity="0.7"/>
    <circle cx="30" cy="72" r="3" opacity="0.6"/><circle cx="90" cy="72" r="3" opacity="0.6"/>
    <circle cx="35" cy="85" r="3" opacity="0.5"/><circle cx="85" cy="85" r="3" opacity="0.5"/>
    <circle cx="45" cy="95" r="3" opacity="0.5"/><circle cx="75" cy="95" r="3" opacity="0.5"/>
    <circle cx="60" cy="100" r="3" opacity="0.6"/>
    <!-- Inner B shape -->
    <circle cx="50" cy="40" r="3" opacity="0.8"/><circle cx="50" cy="50" r="3" opacity="0.9"/>
    <circle cx="50" cy="60" r="3" opacity="0.9"/><circle cx="50" cy="70" r="3" opacity="0.9"/>
    <circle cx="50" cy="80" r="3" opacity="0.8"/>
    <circle cx="60" cy="40" r="3" opacity="0.7"/><circle cx="70" cy="45" r="3" opacity="0.6"/>
    <circle cx="70" cy="55" r="3" opacity="0.7"/><circle cx="60" cy="60" r="3" opacity="0.8"/>
    <circle cx="70" cy="65" r="3" opacity="0.7"/><circle cx="70" cy="75" r="3" opacity="0.6"/>
    <circle cx="60" cy="80" r="3" opacity="0.7"/>
    <!-- Top/bottom hash marks -->
    <circle cx="55" cy="34" r="2" opacity="0.4"/><circle cx="55" cy="86" r="2" opacity="0.4"/>
    <!-- Ambient -->
    <circle cx="15" cy="30" r="1.5" opacity="0.06"/><circle cx="105" cy="90" r="1.5" opacity="0.06"/>
    <circle cx="15" cy="90" r="1.5" opacity="0.06"/><circle cx="105" cy="30" r="1.5" opacity="0.06"/>
  </g>
</svg>