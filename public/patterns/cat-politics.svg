<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <rect width="120" height="120" fill="#0A0B0D"/>
  <!-- Capitol dome shape via dot-matrix -->
  <g fill="#EF4444">
    <!-- Base columns -->
    <circle cx="30" cy="100" r="3" opacity="0.9"/><circle cx="40" cy="100" r="3" opacity="0.9"/>
    <circle cx="50" cy="100" r="3" opacity="0.9"/><circle cx="60" cy="100" r="3" opacity="0.9"/>
    <circle cx="70" cy="100" r="3" opacity="0.9"/><circle cx="80" cy="100" r="3" opacity="0.9"/>
    <circle cx="90" cy="100" r="3" opacity="0.9"/>
    <circle cx="30" cy="90" r="3" opacity="0.8"/><circle cx="90" cy="90" r="3" opacity="0.8"/>
    <circle cx="30" cy="80" r="3" opacity="0.7"/><circle cx="90" cy="80" r="3" opacity="0.7"/>
    <!-- Pediment -->
    <circle cx="40" cy="70" r="3" opacity="0.7"/><circle cx="50" cy="70" r="3" opacity="0.8"/>
    <circle cx="60" cy="70" r="3" opacity="0.8"/><circle cx="70" cy="70" r="3" opacity="0.8"/>
    <circle cx="80" cy="70" r="3" opacity="0.7"/>
    <!-- Dome -->
    <circle cx="50" cy="60" r="3" opacity="0.6"/><circle cx="60" cy="60" r="3" opacity="0.7"/>
    <circle cx="70" cy="60" r="3" opacity="0.6"/>
    <circle cx="50" cy="50" r="3" opacity="0.5"/><circle cx="60" cy="50" r="3" opacity="0.6"/>
    <circle cx="70" cy="50" r="3" opacity="0.5"/>
    <circle cx="55" cy="40" r="3" opacity="0.5"/><circle cx="60" cy="40" r="3" opacity="0.6"/>
    <circle cx="65" cy="40" r="3" opacity="0.5"/>
    <circle cx="60" cy="30" r="3" opacity="0.5"/>
    <!-- Spire -->
    <circle cx="60" cy="20" r="2.5" opacity="0.4"/>
    <circle cx="60" cy="14" r="2" opacity="0.3"/>
    <!-- Ambient dots -->
    <circle cx="20" cy="40" r="1.5" opacity="0.08"/><circle cx="100" cy="40" r="1.5" opacity="0.08"/>
    <circle cx="15" cy="60" r="1.5" opacity="0.06"/><circle cx="105" cy="60" r="1.5" opacity="0.06"/>
    <circle cx="20" cy="80" r="1.5" opacity="0.1"/><circle cx="100" cy="80" r="1.5" opacity="0.1"/>
  </g>
</svg>