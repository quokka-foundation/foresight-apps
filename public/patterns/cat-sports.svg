<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <rect width="120" height="120" fill="#0A0B0D"/>
  <!-- Trophy/ball shape via dot-matrix -->
  <g fill="#10B981">
    <!-- Ball outer circle -->
    <circle cx="60" cy="25" r="3" opacity="0.5"/>
    <circle cx="48" cy="28" r="3" opacity="0.5"/><circle cx="72" cy="28" r="3" opacity="0.5"/>
    <circle cx="38" cy="35" r="3" opacity="0.6"/><circle cx="82" cy="35" r="3" opacity="0.6"/>
    <circle cx="35" cy="45" r="3" opacity="0.7"/><circle cx="85" cy="45" r="3" opacity="0.7"/>
    <circle cx="35" cy="55" r="3" opacity="0.7"/><circle cx="85" cy="55" r="3" opacity="0.7"/>
    <circle cx="38" cy="65" r="3" opacity="0.6"/><circle cx="82" cy="65" r="3" opacity="0.6"/>
    <circle cx="48" cy="72" r="3" opacity="0.5"/><circle cx="72" cy="72" r="3" opacity="0.5"/>
    <circle cx="60" cy="75" r="3" opacity="0.5"/>
    <!-- Ball cross stitch -->
    <circle cx="60" cy="35" r="3" opacity="0.8"/><circle cx="60" cy="45" r="3" opacity="0.9"/>
    <circle cx="60" cy="55" r="3" opacity="0.9"/><circle cx="60" cy="65" r="3" opacity="0.8"/>
    <circle cx="45" cy="50" r="3" opacity="0.7"/><circle cx="50" cy="50" r="3" opacity="0.8"/>
    <circle cx="70" cy="50" r="3" opacity="0.8"/><circle cx="75" cy="50" r="3" opacity="0.7"/>
    <!-- Pedestal -->
    <circle cx="55" cy="82" r="2.5" opacity="0.5"/><circle cx="60" cy="82" r="2.5" opacity="0.5"/>
    <circle cx="65" cy="82" r="2.5" opacity="0.5"/>
    <circle cx="60" cy="88" r="2.5" opacity="0.4"/>
    <circle cx="50" cy="95" r="3" opacity="0.5"/><circle cx="55" cy="95" r="3" opacity="0.6"/>
    <circle cx="60" cy="95" r="3" opacity="0.6"/><circle cx="65" cy="95" r="3" opacity="0.6"/>
    <circle cx="70" cy="95" r="3" opacity="0.5"/>
    <!-- Ambient -->
    <circle cx="18" cy="30" r="1.5" opacity="0.06"/><circle cx="102" cy="70" r="1.5" opacity="0.06"/>
    <circle cx="18" cy="70" r="1.5" opacity="0.06"/><circle cx="102" cy="30" r="1.5" opacity="0.06"/>
  </g>
</svg>