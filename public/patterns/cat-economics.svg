<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <rect width="120" height="120" fill="#0A0B0D"/>
  <!-- Bar chart shape via dot-matrix -->
  <g fill="#F59E0B">
    <!-- Bar 1 (short) -->
    <circle cx="25" cy="95" r="3" opacity="0.8"/><circle cx="35" cy="95" r="3" opacity="0.8"/>
    <circle cx="25" cy="85" r="3" opacity="0.7"/><circle cx="35" cy="85" r="3" opacity="0.7"/>
    <circle cx="25" cy="75" r="3" opacity="0.6"/><circle cx="35" cy="75" r="3" opacity="0.6"/>
    <!-- Bar 2 (medium) -->
    <circle cx="50" cy="95" r="3" opacity="0.8"/><circle cx="60" cy="95" r="3" opacity="0.8"/>
    <circle cx="50" cy="85" r="3" opacity="0.7"/><circle cx="60" cy="85" r="3" opacity="0.7"/>
    <circle cx="50" cy="75" r="3" opacity="0.7"/><circle cx="60" cy="75" r="3" opacity="0.7"/>
    <circle cx="50" cy="65" r="3" opacity="0.6"/><circle cx="60" cy="65" r="3" opacity="0.6"/>
    <circle cx="50" cy="55" r="3" opacity="0.5"/><circle cx="60" cy="55" r="3" opacity="0.5"/>
    <!-- Bar 3 (tall) -->
    <circle cx="75" cy="95" r="3" opacity="0.9"/><circle cx="85" cy="95" r="3" opacity="0.9"/>
    <circle cx="75" cy="85" r="3" opacity="0.8"/><circle cx="85" cy="85" r="3" opacity="0.8"/>
    <circle cx="75" cy="75" r="3" opacity="0.7"/><circle cx="85" cy="75" r="3" opacity="0.7"/>
    <circle cx="75" cy="65" r="3" opacity="0.7"/><circle cx="85" cy="65" r="3" opacity="0.7"/>
    <circle cx="75" cy="55" r="3" opacity="0.6"/><circle cx="85" cy="55" r="3" opacity="0.6"/>
    <circle cx="75" cy="45" r="3" opacity="0.5"/><circle cx="85" cy="45" r="3" opacity="0.5"/>
    <circle cx="75" cy="35" r="3" opacity="0.4"/><circle cx="85" cy="35" r="3" opacity="0.4"/>
    <!-- Trend line dots -->
    <circle cx="30" cy="68" r="2" opacity="0.9"/><circle cx="55" cy="48" r="2" opacity="0.9"/>
    <circle cx="80" cy="28" r="2" opacity="0.9"/>
    <circle cx="42" cy="58" r="1.5" opacity="0.4"/><circle cx="68" cy="38" r="1.5" opacity="0.4"/>
    <!-- Axis -->
    <circle cx="15" cy="95" r="1.5" opacity="0.15"/><circle cx="15" cy="85" r="1.5" opacity="0.1"/>
    <circle cx="15" cy="75" r="1.5" opacity="0.08"/><circle cx="15" cy="65" r="1.5" opacity="0.06"/>
    <circle cx="95" cy="95" r="1.5" opacity="0.15"/><circle cx="105" cy="95" r="1.5" opacity="0.1"/>
  </g>
</svg>